{% extends "base.html" %}
{% load static %}
{% block title %}Sign up - CMU Todo{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h1>Create account</h1>
        <p class="subtitle">Start tracking your class tasks</p>
        <form id="register-form" class="auth-form">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="email" name="email" placeholder="Email (optional)">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Sign up</button>
        </form>
        <p id="error" class="error"></p>
        <p class="auth-link">Already have an account? <a href="/login/">Log in</a></p>
    </div>
</div>
<script>
    (function() {
        const form = document.getElementById('register-form');
        const err = document.getElementById('error');
        if (!form || !err) return;
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            err.textContent = '';
            const csrfToken = form.querySelector('[name=csrfmiddlewaretoken]')?.value || '';
            try {
                const res = await fetch('/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrfToken },
                    body: JSON.stringify({ username: form.username.value, email: form.email.value, password: form.password.value })
                });
                const data = await res.json().catch(() => ({}));
                if (data.success) window.location = data.redirect || '/';
                else err.textContent = data.error || 'Registration failed';
            } catch (e) {
                err.textContent = 'Network error. Please try again.';
            }
        });
    })();
</script>
{% endblock %}
